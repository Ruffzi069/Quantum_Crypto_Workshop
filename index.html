<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quantum Crypto for Hackers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Docsify -->

  <link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    /* =====================
       COLOR PALETTE
    ====================== */
    :root {
      --bg-main: #080a0f;
      --bg-soft: #0d1118;
      --border-soft: #1f2430;
      --text-main: #cfd3dc;
      --text-muted: #9aa1ad;
      --accent-violet: #9b87f5;
      --accent-amber: #f0b35f;
      --code-bg: #0c1018;
    }

    /* =====================
       BASE
    ====================== */
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0b0f17, #06080d);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
    }

    p {
      line-height: 1.85;
      margin: 1.4rem 0;
      color: var(--text-main);
    }

    h1, h2, h3 {
      font-family: 'VT323', monospace;
      color: var(--accent-violet);
      letter-spacing: 1px;
      margin-top: 2.6rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: 2.6rem;
    }

    h2 {
      font-size: 2.1rem;
    }

    h3 {
      font-size: 1.6rem;
      color: var(--accent-amber);
    }

    /* =====================
       LAYOUT
    ====================== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* =====================
       SIDEBAR
    ====================== */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #070a11, #05070c);
      border-right: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-inner {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      text-align: center;
    }

    .sidebar h1 {
      font-size: 2.2rem;
      margin-bottom: 1.4rem;
      color: var(--accent-violet);
    }

    .sidebar a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    .sidebar a:hover {
      color: var(--accent-amber);
    }

    /* =====================
       MAIN VIEW
    ====================== */
    .main-view {
      flex: 1;
      padding: 10px 24px;
      overflow-y: auto;
    }

    /* =====================
       DOCSIFY OVERRIDES
    ====================== */
    .markdown-section {
      max-width: 860px !important;
      padding: 2.5rem 1rem !important;
      margin: 0 auto !important;
    }

    .markdown-section ul,
    .markdown-section ol {
      margin: 1.4rem 0 1.8rem 1.6rem;
      line-height: 1.8;
    }

    .markdown-section li {
      margin-bottom: 0.6rem;
    }

    /* =====================
       CODE BLOCKS
    ====================== */
    code {
      background-color: var(--code-bg);
      color: var(--accent-amber);
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-soft);
      font-size: 0.9rem;
    }

    pre {
      background-color: var(--code-bg);
      border-left: 4px solid var(--accent-violet);
      padding: 16px 18px;
      margin: 2rem 0;
      overflow-x: auto;
      border-radius: 6px;
    }

    pre code {
      border: none;
      padding: 0;
      color: #d6dae3;
    }

    /* =====================
       BLOCKQUOTES
    ====================== */
    blockquote {
      border-left: 4px solid var(--accent-amber);
      background: #0b0f17;
      padding: 1rem 1.4rem;
      margin: 2rem 0;
      color: var(--text-muted);
    }

    /* =====================
       SELECTION
    ====================== */
    ::selection {
      background: var(--accent-violet);
      color: #05070c;
    }

  </style>
</head>
